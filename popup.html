<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SR Offer Filler</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0f12;
      --surface: #151820;
      --border: #22272f;
      --accent: #00e5a0;
      --accent-dim: rgba(0,229,160,0.12);
      --accent-glow: rgba(0,229,160,0.35);
      --warn: #ff6b4a;
      --warn-dim: rgba(255,107,74,0.12);
      --text: #e8eaf0;
      --muted: #5a6070;
      --mono: 'Courier New', 'Consolas', monospace;
      --display: -apple-system, 'Segoe UI', sans-serif;
    }

    body {
      width: 340px;
      background: var(--bg);
      color: var(--text);
      font-family: var(--mono);
      font-size: 12px;
      min-height: 200px;
    }

    /* ── Header ── */
    .header {
      padding: 18px 20px 14px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
      position: relative;
      overflow: hidden;
    }
    .header::before {
      content: '';
      position: absolute;
      top: -20px; right: -20px;
      width: 100px; height: 100px;
      background: radial-gradient(circle, var(--accent-glow) 0%, transparent 70%);
      pointer-events: none;
    }
    .logo {
      width: 28px; height: 28px;
      background: var(--accent);
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-family: var(--display);
      font-weight: 800;
      font-size: 13px;
      color: #0d0f12;
      flex-shrink: 0;
    }
    .header-text h1 {
      font-family: var(--display);
      font-size: 14px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: 0.02em;
    }
    .header-text p {
      font-size: 10px;
      color: var(--muted);
      margin-top: 1px;
    }

    /* ── Drop Zone ── */
    .drop-zone {
      margin: 16px 16px 0;
      border: 1.5px dashed var(--border);
      border-radius: 10px;
      padding: 20px 16px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s ease;
      position: relative;
      background: var(--surface);
    }
    .drop-zone:hover, .drop-zone.drag-over {
      border-color: var(--accent);
      background: var(--accent-dim);
    }
    .drop-zone.drag-over { transform: scale(1.01); }
    .drop-zone input[type="file"] {
      position: absolute; inset: 0;
      opacity: 0; cursor: pointer; width: 100%; height: 100%;
    }
    .drop-icon {
      font-size: 24px;
      margin-bottom: 6px;
      display: block;
    }
    .drop-zone .drop-label {
      font-family: var(--display);
      font-size: 12px;
      font-weight: 600;
      color: var(--text);
      display: block;
    }
    .drop-zone .drop-sub {
      font-size: 10px;
      color: var(--muted);
      margin-top: 3px;
      display: block;
    }

    /* ── File loaded state ── */
    .file-loaded {
      margin: 16px 16px 0;
      background: var(--accent-dim);
      border: 1.5px solid var(--accent);
      border-radius: 10px;
      padding: 10px 14px;
      display: none;
      align-items: center;
      gap: 10px;
    }
    .file-loaded.visible { display: flex; }
    .file-loaded .file-icon { font-size: 18px; flex-shrink: 0; }
    .file-loaded .file-info { flex: 1; min-width: 0; }
    .file-loaded .file-name {
      font-size: 11px;
      font-weight: 500;
      color: var(--accent);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .file-loaded .field-count {
      font-size: 10px;
      color: var(--muted);
      margin-top: 2px;
    }
    .file-clear {
      background: none; border: none;
      color: var(--muted); cursor: pointer;
      font-size: 16px; padding: 2px;
      line-height: 1;
      flex-shrink: 0;
      transition: color 0.15s;
    }
    .file-clear:hover { color: var(--warn); }

    /* ── Preview table ── */
    .preview {
      margin: 10px 16px 0;
      display: none;
      max-height: 160px;
      overflow-y: auto;
      border-radius: 8px;
      border: 1px solid var(--border);
    }
    .preview.visible { display: block; }
    .preview::-webkit-scrollbar { width: 4px; }
    .preview::-webkit-scrollbar-track { background: transparent; }
    .preview::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .preview-table {
      width: 100%;
      border-collapse: collapse;
    }
    .preview-table tr {
      border-bottom: 1px solid var(--border);
      transition: background 0.1s;
    }
    .preview-table tr:last-child { border-bottom: none; }
    .preview-table tr:hover { background: var(--surface); }
    .preview-table td {
      padding: 5px 10px;
      font-size: 10px;
    }
    .preview-table td:first-child {
      color: var(--muted);
      width: 55%;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 0;
    }
    .preview-table td:last-child {
      color: var(--accent);
      font-weight: 500;
      text-align: right;
    }
    .preview-table td.empty {
      color: var(--border);
      font-style: italic;
    }

    /* ── Run button ── */
    .run-btn {
      margin: 12px 16px;
      width: calc(100% - 32px);
      padding: 11px;
      background: var(--accent);
      color: #0d0f12;
      border: none;
      border-radius: 8px;
      font-family: var(--display);
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.04em;
      transition: all 0.2s;
      display: none;
      position: relative;
      overflow: hidden;
    }
    .run-btn::after {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.15) 0%, transparent 60%);
    }
    .run-btn.visible { display: block; }
    .run-btn:hover {
      background: #00ffb3;
      box-shadow: 0 0 20px var(--accent-glow);
      transform: translateY(-1px);
    }
    .run-btn:active { transform: translateY(0); }
    .run-btn:disabled {
      background: var(--muted);
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    /* ── Status / Log ── */
    .status {
      margin: 0 16px 14px;
      display: none;
    }
    .status.visible { display: block; }

    .status-header {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 6px;
    }
    .status-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--muted);
      flex-shrink: 0;
    }
    .status-dot.running {
      background: var(--accent);
      animation: pulse 1s infinite;
    }
    .status-dot.done { background: var(--accent); }
    .status-dot.error { background: var(--warn); }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.8); }
    }

    .status-label {
      font-size: 10px;
      color: var(--muted);
      font-family: var(--display);
      font-weight: 600;
    }

    .log {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 10px;
      max-height: 110px;
      overflow-y: auto;
      font-size: 10px;
      line-height: 1.7;
    }
    .log::-webkit-scrollbar { width: 3px; }
    .log::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    .log-line { display: flex; gap: 6px; }
    .log-line .tick { color: var(--accent); flex-shrink: 0; }
    .log-line .cross { color: var(--warn); flex-shrink: 0; }
    .log-line .wait { color: var(--muted); flex-shrink: 0; }
    .log-line .msg { color: var(--muted); }
    .log-line .msg.active { color: var(--text); }

    /* ── Summary bar ── */
    .summary {
      margin: 8px 16px 14px;
      display: none;
      gap: 8px;
    }
    .summary.visible { display: flex; }
    .summary-pill {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 7px 10px;
      text-align: center;
    }
    .summary-pill.good { border-color: var(--accent); background: var(--accent-dim); }
    .summary-pill.bad  { border-color: var(--warn);  background: var(--warn-dim); }
    .summary-pill .pill-num {
      font-family: var(--display);
      font-size: 18px;
      font-weight: 800;
      display: block;
      line-height: 1;
    }
    .summary-pill.good .pill-num { color: var(--accent); }
    .summary-pill.bad  .pill-num { color: var(--warn); }
    .summary-pill .pill-label {
      font-size: 9px;
      color: var(--muted);
      margin-top: 2px;
      display: block;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    /* ── Currency note ── */
    .currency-note {
      margin: 8px 16px 0;
      padding: 8px 12px;
      background: var(--warn-dim);
      border: 1px solid var(--warn);
      border-radius: 6px;
      font-size: 10px;
      color: var(--warn);
      display: none;
    }
    .currency-note.visible { display: block; }
  </style>
</head>
<body>

  <div class="header">
    <div class="logo">SR</div>
    <div class="header-text">
      <h1>Mr Offer</h1>
      <p>SmartRecruiters · INR auto-fill</p>
    </div>
  </div>

  <!-- Drop zone -->
  <div class="drop-zone" id="dropZone">
    <input type="file" id="fileInput" accept=".xlsx,.xls" />
    <span class="drop-icon">📂</span>
    <span class="drop-label">Drop Excel file here</span>
    <span class="drop-sub">or click to browse · .xlsx / .xls</span>
  </div>

  <!-- File loaded indicator -->
  <div class="file-loaded" id="fileLoaded">
    <span class="file-icon">📊</span>
    <div class="file-info">
      <div class="file-name" id="fileName">—</div>
      <div class="field-count" id="fieldCount">—</div>
    </div>
    <button class="file-clear" id="fileClear" title="Remove file">✕</button>
  </div>

  <!-- Preview table -->
  <div class="preview" id="preview">
    <table class="preview-table" id="previewTable"></table>
  </div>

  <!-- Currency note (shown when file loaded) -->
  <div class="currency-note" id="currencyNote">
    Currency change must be done manually (USD → INR)
  </div>

  <!-- Run button -->
  <button class="run-btn" id="runBtn">▶ Fill Form Now</button>

  <!-- Status log -->
  <div class="status" id="statusBox">
    <div class="status-header">
      <div class="status-dot" id="statusDot"></div>
      <span class="status-label" id="statusLabel">Idle</span>
    </div>
    <div class="log" id="log"></div>
  </div>

  <!-- Summary -->
  <div class="summary" id="summary">
    <div class="summary-pill good">
      <span class="pill-num" id="sumFilled">0</span>
      <span class="pill-label">Filled</span>
    </div>
    <div class="summary-pill" id="sumCurrencyPill">
      <span class="pill-num" id="sumCurrency">0</span>
      <span class="pill-label">Currencies → INR</span>
    </div>
    <div class="summary-pill bad" id="sumErrorPill" style="display:none">
      <span class="pill-num" id="sumErrors">0</span>
      <span class="pill-label">Errors</span>
    </div>
  </div>

  <script src="xlsx-mini.js"></script>
  <script src="popup.js"></script>
</body>
</html>
