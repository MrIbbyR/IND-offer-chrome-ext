# Unbound recursive resolver for Pi-hole (sidecar). Apply before the deployment patch.
#   kubectl apply -f unbound-configmap.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: unbound-config
  namespace: pihole
data:
  unbound.conf: |
    server:
      verbosity: 0
      interface: 127.0.0.1
      port: 5335
      do-ip4: yes
      do-udp: yes
      do-tcp: yes
      root-hints: "/var/unbound/root.hints"
      hide-identity: yes
      hide-version: yes
      harden-glue: yes
      use-caps-for-id: yes
      cache-min-ttl: 3600
      cache-max-ttl: 86400
      prefetch: yes
      qname-minimisation: yes
