# Strategic-merge patch: adds Unbound sidecar + Pi-hole upstream to Unbound only.
# Apply after unbound-configmap.yaml:
#   kubectl patch deployment pihole -n pihole --type strategic --patch-file pihole-deployment-unbound-sidecar.patch.yaml
#
# If your Pi-hole container is not named "pihole", rename the first container's "name:" to match.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pihole
  namespace: pihole
spec:
  template:
    spec:
      containers:
        - name: pihole
          env:
            - name: FTLCONF_dns_upstreams
              value: "127.0.0.1#5335"
        - name: unbound
          image: klutchell/unbound:latest
          imagePullPolicy: IfNotPresent
          volumeMounts:
            - name: unbound-config
              mountPath: /etc/unbound/unbound.conf
              subPath: unbound.conf
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 256Mi
      volumes:
        - name: unbound-config
          configMap:
            name: unbound-config
